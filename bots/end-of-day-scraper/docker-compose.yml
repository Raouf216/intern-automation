services:
  end-of-day-scraper:
    container_name: end-of-day-scraper
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${END_OF_DAY_SCRAPER_PORT:-8021}:8000"
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-Europe/Berlin}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_SCHEMA=${SUPABASE_SCHEMA:-private}
      - SUPABASE_EOD_ORDERS_TABLE=${SUPABASE_EOD_ORDERS_TABLE:-doktorabc_eod_bot_orders}
      - DOKTORABC_LOGIN_URL=${DOKTORABC_LOGIN_URL:-}
      - DOKTORABC_END_OF_DAY_URL=${DOKTORABC_END_OF_DAY_URL:-https://pharmacies.doktorabc.com/end-of-day}
      - DOKTORABC_SELF_PICKUP_URL=${DOKTORABC_SELF_PICKUP_URL:-}
      - DOKTORABC_USERNAME=${DOKTORABC_USERNAME:-}
      - DOKTORABC_PASSWORD=${DOKTORABC_PASSWORD:-}
      - DOKTORABC_HEADLESS=${DOKTORABC_HEADLESS:-true}
      - DOKTORABC_USER_AGENT=${DOKTORABC_USER_AGENT:-Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/136.0.0.0 Safari/537.36}
      - EOD_MAX_PAGES=${EOD_MAX_PAGES:-100}
      - EOD_AFTER_GOTO_WAIT_MS=${EOD_AFTER_GOTO_WAIT_MS:-2000}
      - EOD_AFTER_READY_FOR_CUSTOMER_CLICK_WAIT_MS=${EOD_AFTER_READY_FOR_CUSTOMER_CLICK_WAIT_MS:-2000}
      - EOD_AFTER_SELECT_100_CLICK_WAIT_MS=${EOD_AFTER_SELECT_100_CLICK_WAIT_MS:-1500}
      - EOD_AFTER_NEXT_CLICK_WAIT_MS=${EOD_AFTER_NEXT_CLICK_WAIT_MS:-1500}
      - END_OF_DAY_EXPORT_N8N_WEBHOOK_URL=${END_OF_DAY_EXPORT_N8N_WEBHOOK_URL:-}
      - END_OF_DAY_NOTIFICATION_WEBHOOK_URL=${END_OF_DAY_NOTIFICATION_WEBHOOK_URL:-}
      - END_OF_DAY_SCRAPER_CORS_ORIGINS=${END_OF_DAY_SCRAPER_CORS_ORIGINS:-http://localhost:8040,http://127.0.0.1:8040,http://178.104.144.30:8040}
      - ARTIFACTS_DIR=/app/artifacts
      - DOKTORABC_SESSION_STATE_PATH=${DOKTORABC_SESSION_STATE_PATH:-/app/artifacts/doktorabc-storage-state.json}
    volumes:
      - "${WEB_SCRAPER_ARTIFACTS_DIR:-../../web-scraper-artifacts}:/app/artifacts"
    networks:
      - default
      - supabase_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  supabase_network:
    external: true
    name: analyticsengine-supabase-b2lvjw_default
