services:
  pickup-ready-scraper:
    container_name: pickup-ready-scraper
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PICKUP_READY_SCRAPER_PORT:-${END_OF_DAY_SCRAPER_PORT:-8022}}:8000"
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-Europe/Berlin}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_SCHEMA=${SUPABASE_SCHEMA:-private}
      - SUPABASE_EOD_ORDERS_TABLE=${SUPABASE_EOD_ORDERS_TABLE:-doktorabc_eod_bot_orders}
      - DOKTORABC_LOGIN_URL=${DOKTORABC_LOGIN_URL:-}
      - DOKTORABC_END_OF_DAY_URL=${DOKTORABC_END_OF_DAY_URL:-https://pharmacies.doktorabc.com/end-of-day}
      - DOKTORABC_SELF_PICKUP_URL=${DOKTORABC_SELF_PICKUP_URL:-}
      - DOKTORABC_SCRAPER_SERVICE_NAME=${DOKTORABC_SCRAPER_SERVICE_NAME:-pickup-ready-scraper}
      - EOD_ORDER_TARGET_MODE=${PICKUP_READY_ORDER_TARGET_MODE:-pickup_ready}
      - DOKTORABC_USERNAME=${DOKTORABC_USERNAME:-}
      - DOKTORABC_PASSWORD=${DOKTORABC_PASSWORD:-}
      - DOKTORABC_HEADLESS=${DOKTORABC_HEADLESS:-true}
      - DOKTORABC_PERSISTENT_CONTEXT_ENABLED=${DOKTORABC_PERSISTENT_CONTEXT_ENABLED:-true}
      - DOKTORABC_PERSISTENT_CONTEXT_DIR=${DOKTORABC_PERSISTENT_CONTEXT_DIR:-/app/artifacts/doktorabc-pickup-ready-profile}
      - DOKTORABC_USER_AGENT=${DOKTORABC_USER_AGENT:-Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/136.0.0.0 Safari/537.36}
      - EOD_MAX_PAGES=${EOD_MAX_PAGES:-100}
      - EOD_AFTER_GOTO_WAIT_MS=${EOD_AFTER_GOTO_WAIT_MS:-2000}
      - EOD_AFTER_READY_FOR_CUSTOMER_CLICK_WAIT_MS=${EOD_AFTER_READY_FOR_CUSTOMER_CLICK_WAIT_MS:-2000}
      - EOD_AFTER_SELECT_100_CLICK_WAIT_MS=${EOD_AFTER_SELECT_100_CLICK_WAIT_MS:-1500}
      - EOD_AFTER_NEXT_CLICK_WAIT_MS=${EOD_AFTER_NEXT_CLICK_WAIT_MS:-1500}
      - PICKUP_READY_AUTO_SYNC_ENABLED=${PICKUP_READY_AUTO_SYNC_ENABLED:-true}
      - PICKUP_READY_AUTO_SYNC_MIN_MINUTES=${PICKUP_READY_AUTO_SYNC_MIN_MINUTES:-27}
      - PICKUP_READY_AUTO_SYNC_MAX_MINUTES=${PICKUP_READY_AUTO_SYNC_MAX_MINUTES:-33}
      - PICKUP_READY_AUTO_SYNC_INITIAL_DELAY_SECONDS=${PICKUP_READY_AUTO_SYNC_INITIAL_DELAY_SECONDS:-15}
      - PICKUP_READY_AUTO_SYNC_CLOSED_FROM=${PICKUP_READY_AUTO_SYNC_CLOSED_FROM:-}
      - PICKUP_READY_AUTO_SYNC_CLOSED_TO=${PICKUP_READY_AUTO_SYNC_CLOSED_TO:-}
      - PICKUP_READY_BEFORE_OPEN_DELAY_MIN_SECONDS=${PICKUP_READY_BEFORE_OPEN_DELAY_MIN_SECONDS:-3}
      - PICKUP_READY_BEFORE_OPEN_DELAY_MAX_SECONDS=${PICKUP_READY_BEFORE_OPEN_DELAY_MAX_SECONDS:-18}
      - END_OF_DAY_NOTIFICATION_WEBHOOK_URL=${END_OF_DAY_NOTIFICATION_WEBHOOK_URL:-}
      - END_OF_DAY_SCRAPER_CORS_ORIGINS=${PICKUP_READY_SCRAPER_CORS_ORIGINS:-${END_OF_DAY_SCRAPER_CORS_ORIGINS:-http://localhost:8040,http://127.0.0.1:8040,http://178.104.144.30:8040}}
      - ARTIFACTS_DIR=/app/artifacts
      - DOKTORABC_SESSION_STATE_PATH=${DOKTORABC_SESSION_STATE_PATH:-/app/artifacts/doktorabc-storage-state.json}
    volumes:
      - "${WEB_SCRAPER_ARTIFACTS_DIR:-../../web-scraper-artifacts}:/app/artifacts"
    networks:
      - default
      - supabase_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  supabase_network:
    external: true
    name: analyticsengine-supabase-b2lvjw_default
