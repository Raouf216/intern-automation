services:
  send-wawican:
    container_name: send-wawican
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SEND_WAWICAN_PORT:-8076}:8000"
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-Europe/Berlin}
      - WAWICAN_LOGIN_URL=${WAWICAN_LOGIN_URL:-https://app.wawican.com/crm/inventoryv2?type=buds}
      - WAWICAN_INVENTORY_URL=${WAWICAN_INVENTORY_URL:-https://app.wawican.com/crm/inventoryv2?type=buds}
      - WAWICAN_USERNAME=${WAWICAN_USERNAME:-}
      - WAWICAN_PASSWORD=${WAWICAN_PASSWORD:-}
      - WAWICAN_HEADLESS=${WAWICAN_HEADLESS:-true}
      - WAWICAN_USER_AGENT=${WAWICAN_USER_AGENT:-Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/136.0.0.0 Safari/537.36}
      - WAWICAN_READY_TEXT=${WAWICAN_READY_TEXT:-Verfügbarkeit}
      - WAWICAN_USERNAME_SELECTOR=${WAWICAN_USERNAME_SELECTOR:-}
      - WAWICAN_PASSWORD_SELECTOR=${WAWICAN_PASSWORD_SELECTOR:-}
      - WAWICAN_LOGIN_BUTTON_SELECTOR=${WAWICAN_LOGIN_BUTTON_SELECTOR:-}
      - WAWICAN_LOGIN_EXTRA_CLICK_TEXT=${WAWICAN_LOGIN_EXTRA_CLICK_TEXT:-}
      - SEND_WAWICAN_CORS_ORIGINS=${SEND_WAWICAN_CORS_ORIGINS:-http://localhost:8076,http://127.0.0.1:8076}
      - SEND_WAWICAN_PUBLIC_BASE_URL=${SEND_WAWICAN_PUBLIC_BASE_URL:-}
      - SEND_WAWICAN_NAVIGATION_TIMEOUT_MS=${SEND_WAWICAN_NAVIGATION_TIMEOUT_MS:-30000}
      - SEND_WAWICAN_INVENTORY_READY_TIMEOUT_MS=${SEND_WAWICAN_INVENTORY_READY_TIMEOUT_MS:-60000}
      - SEND_WAWICAN_POST_LOGIN_READY_TIMEOUT_MS=${SEND_WAWICAN_POST_LOGIN_READY_TIMEOUT_MS:-15000}
      - SEND_WAWICAN_WAIT_FOR_NETWORKIDLE=${SEND_WAWICAN_WAIT_FOR_NETWORKIDLE:-false}
      - SEND_WAWICAN_SESSION_STATE_PATH=${SEND_WAWICAN_SESSION_STATE_PATH:-/app/artifacts/wawican-send-storage-state.json}
      - ARTIFACTS_DIR=/app/artifacts
    volumes:
      - "${SEND_WAWICAN_ARTIFACTS_DIR:-../../send-wawican-artifacts}:/app/artifacts"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
