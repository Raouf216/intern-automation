services:
  wawican-scan:
    container_name: wawican-scan
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${WAWICAN_SCAN_PORT:-8024}:8000"
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-Europe/Berlin}
      - WAWICAN_LOGIN_URL=${WAWICAN_LOGIN_URL:-}
      - WAWICAN_INVENTORY_URL=${WAWICAN_INVENTORY_URL:-}
      - WAWICAN_USERNAME=${WAWICAN_USERNAME:-}
      - WAWICAN_PASSWORD=${WAWICAN_PASSWORD:-}
      - WAWICAN_HEADLESS=${WAWICAN_HEADLESS:-true}
      - WAWICAN_USER_AGENT=${WAWICAN_USER_AGENT:-Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/136.0.0.0 Safari/537.36}
      - WAWICAN_READY_TEXT=${WAWICAN_READY_TEXT:-Verfügbarkeit}
      - WAWICAN_INVENTORY_READY_TIMEOUT_MS=${WAWICAN_INVENTORY_READY_TIMEOUT_MS:-60000}
      - WAWICAN_POST_LOGIN_READY_TIMEOUT_MS=${WAWICAN_POST_LOGIN_READY_TIMEOUT_MS:-15000}
      - WAWICAN_FILTER_TIMEOUT_MS=${WAWICAN_FILTER_TIMEOUT_MS:-60000}
      - WAWICAN_SCRAPE_PAGE_READY_TIMEOUT_MS=${WAWICAN_SCRAPE_PAGE_READY_TIMEOUT_MS:-30000}
      - WAWICAN_SCRAPE_MAX_PAGES=${WAWICAN_SCRAPE_MAX_PAGES:-250}
      - WAWICAN_USERNAME_SELECTOR=${WAWICAN_USERNAME_SELECTOR:-}
      - WAWICAN_PASSWORD_SELECTOR=${WAWICAN_PASSWORD_SELECTOR:-}
      - WAWICAN_LOGIN_BUTTON_SELECTOR=${WAWICAN_LOGIN_BUTTON_SELECTOR:-}
      - WAWICAN_LOGIN_EXTRA_CLICK_TEXT=${WAWICAN_LOGIN_EXTRA_CLICK_TEXT:-}
      - WAWICAN_SCAN_CORS_ORIGINS=${WAWICAN_SCAN_CORS_ORIGINS:-http://localhost:8040,http://127.0.0.1:8040,http://178.104.144.30:8040}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_SCHEMA=${SUPABASE_SCHEMA:-private}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL:-}
      - WAWICAN_PRODUCTS_SCHEMA=${WAWICAN_PRODUCTS_SCHEMA:-private}
      - WAWICAN_PRODUCTS_TABLE=${WAWICAN_PRODUCTS_TABLE:-wawican_products}
      - WAWICAN_PRODUCTS_FLAT_VIEW=${WAWICAN_PRODUCTS_FLAT_VIEW:-wawican_products_flat}
      - WAWICAN_PRODUCTS_FLAT_VIEW_ENABLED=${WAWICAN_PRODUCTS_FLAT_VIEW_ENABLED:-false}
      - WAWICAN_PRODUCTS_REST_COLUMNS=${WAWICAN_PRODUCTS_REST_COLUMNS:-}
      - WAWICAN_PRODUCTS_UPSERT_ON=${WAWICAN_PRODUCTS_UPSERT_ON:-product_name}
      - WAWICAN_PRODUCTS_REPLACE_ALL=${WAWICAN_PRODUCTS_REPLACE_ALL:-true}
      - WAWICAN_PRODUCTS_DRY_RUN=${WAWICAN_PRODUCTS_DRY_RUN:-false}
      - WAWICAN_STOCK_REPORT_ENABLED=${WAWICAN_STOCK_REPORT_ENABLED:-true}
      - WAWICAN_STOCK_REPORT_N8N_WEBHOOK_URL=${WAWICAN_STOCK_REPORT_N8N_WEBHOOK_URL:-}
      - WAWICAN_STOCK_REPORT_N8N_TIMEOUT_SECONDS=${WAWICAN_STOCK_REPORT_N8N_TIMEOUT_SECONDS:-60}
      - WAWICAN_SUPABASE_TIMEOUT_SECONDS=${WAWICAN_SUPABASE_TIMEOUT_SECONDS:-60}
      - ARTIFACTS_DIR=/app/artifacts
      - WAWICAN_SESSION_STATE_PATH=${WAWICAN_SESSION_STATE_PATH:-/app/artifacts/wawican-storage-state.json}
    volumes:
      - wawican-scan-artifacts:/app/artifacts
    networks:
      - default
      - supabase_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  supabase_network:
    external: true
    name: analyticsengine-supabase-b2lvjw_default

volumes:
  wawican-scan-artifacts:
    name: wawican-scan-artifacts
