services:
  abrechnung-verification-dashboard:
    container_name: abrechnung-verification-dashboard
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    ports:
      - "${ABRECHNUNG_VERIFICATION_DASHBOARD_PORT:-8060}:8000"
    networks:
      - dokploy-network
    environment:
      - PORT=8000
      - HOSTNAME=0.0.0.0
      - TZ=${TZ:-Europe/Berlin}
      - ABRECHNUNG_VERIFICATION_INGEST_TOKEN=${ABRECHNUNG_VERIFICATION_INGEST_TOKEN:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_NOTIFICATIONS_SCHEMA=${SUPABASE_NOTIFICATIONS_SCHEMA:-public}
      - SUPABASE_NOTIFICATIONS_TABLE=${SUPABASE_NOTIFICATIONS_TABLE:-notifications}
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  dokploy-network:
    external: true
