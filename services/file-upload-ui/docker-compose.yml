services:
  file-upload-ui:
    container_name: file-upload-ui
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    ports:
      - "${FILE_UPLOAD_UI_PORT:-8030}:8000"
    environment:
      - PORT=8000
      - TZ=${TZ:-Europe/Berlin}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_STORAGE_BUCKET=${SUPABASE_STORAGE_BUCKET:-oed-files}
      - SUPABASE_STORAGE_PREFIX=${SUPABASE_STORAGE_PREFIX:-oed}
      - UPLOAD_PASSWORD=${UPLOAD_PASSWORD:-}
      - ABRECHNUNG_STORAGE_BUCKET=${ABRECHNUNG_STORAGE_BUCKET:-abrechnung-files}
      - ABRECHNUNG_STORAGE_PREFIX=${ABRECHNUNG_STORAGE_PREFIX:-doktorabc-abrechnung}
      - ABRECHNUNG_UPLOAD_PASSWORD=${ABRECHNUNG_UPLOAD_PASSWORD:-}
      - N8N_UPLOAD_WEBHOOK_URL=${N8N_UPLOAD_WEBHOOK_URL:-}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-20}
      - ALLOWED_EXTENSIONS=${ALLOWED_EXTENSIONS:-.xlsx,.xls}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
