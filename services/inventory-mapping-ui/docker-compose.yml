services:
  inventory-mapping-ui:
    container_name: inventory-mapping-ui
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    ports:
      - "${INVENTORY_MAPPING_UI_PORT:-8073}:8000"
    networks:
      - dokploy-network
      - supabase_network
    environment:
      - PORT=8000
      - HOSTNAME=0.0.0.0
      - TZ=${TZ:-Europe/Berlin}
      - SUPABASE_URL=${SUPABASE_URL:-http://supabase-kong:8000}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_INVENTORY_MAPPING_SCHEMA=${SUPABASE_INVENTORY_MAPPING_SCHEMA:-public}
      - SUPABASE_INVENTORY_MAPPING_VIEW=${SUPABASE_INVENTORY_MAPPING_VIEW:-inventory_product_mapping}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  dokploy-network:
    external: true
  supabase_network:
    external: true
    name: analyticsengine-supabase-b2lvjw_default
