services:
  product-sync-signal-ui:
    container_name: product-sync-signal-ui
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_PRODUCT_SYNC_ENDPOINT: ${NEXT_PUBLIC_PRODUCT_SYNC_ENDPOINT:-}
        NEXT_PUBLIC_EOD_ORDERS_ENDPOINT: ${NEXT_PUBLIC_EOD_ORDERS_ENDPOINT:-}
        NEXT_PUBLIC_EOD_LOGIN_ENDPOINT: ${NEXT_PUBLIC_EOD_LOGIN_ENDPOINT:-}
        NEXT_PUBLIC_PICKUP_READY_ENDPOINT: ${NEXT_PUBLIC_PICKUP_READY_ENDPOINT:-}
        NEXT_PUBLIC_PRODUCT_SYNC_PASSWORD: ${NEXT_PUBLIC_PRODUCT_SYNC_PASSWORD:-}
    restart: unless-stopped
    init: true
    ports:
      - "${PRODUCT_SYNC_SIGNAL_UI_PORT:-8040}:8000"
    environment:
      - PORT=8000
      - HOSTNAME=0.0.0.0
      - TZ=${TZ:-Europe/Berlin}
      - PRODUCT_SYNC_N8N_WEBHOOK_URL=${PRODUCT_SYNC_N8N_WEBHOOK_URL:-}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
