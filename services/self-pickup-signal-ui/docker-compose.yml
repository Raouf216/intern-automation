services:
  self-pickup-signal-ui:
    container_name: self-pickup-signal-ui
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SELF_PICKUP_PASSWORD: ${NEXT_PUBLIC_SELF_PICKUP_PASSWORD:-}
    restart: unless-stopped
    init: true
    ports:
      - "${SELF_PICKUP_SIGNAL_UI_PORT:-8070}:8000"
    networks:
      - dokploy-network
      - supabase_network
    environment:
      - PORT=8000
      - HOSTNAME=0.0.0.0
      - TZ=${TZ:-Europe/Berlin}
      - NEXT_PUBLIC_SELF_PICKUP_PASSWORD=${NEXT_PUBLIC_SELF_PICKUP_PASSWORD:-}
      - PICKUP_DONE_BOT_ENDPOINT=${PICKUP_DONE_BOT_ENDPOINT:-}
      - PICKUP_DONE_DRY_RUN=${PICKUP_DONE_DRY_RUN:-true}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_EOD_ORDERS_SCHEMA=${SUPABASE_EOD_ORDERS_SCHEMA:-private}
      - SUPABASE_EOD_ORDERS_TABLE=${SUPABASE_EOD_ORDERS_TABLE:-doktorabc_eod_bot_orders}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  dokploy-network:
    external: true
  supabase_network:
    external: true
    name: analyticsengine-supabase-b2lvjw_default
